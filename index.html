<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>원종제일교회 스마트 주보</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        html { scroll-behavior: smooth; scroll-padding-top: 5rem; }
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s, color 0.3s; overflow-x: hidden; }
        .bg-church { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); transition: all 0.3s; }
        .pb-safe { padding-bottom: calc(7.5rem + env(safe-area-inset-bottom)); }
        .worship-row { display: grid; grid-template-columns: 1fr 1.2fr 1fr; border-bottom: 1px dotted #e5e7eb; padding: 12px 0; font-size: 0.95rem; align-items: center; }
        .worship-row span:nth-child(1) { text-align: left; color: #666; }
        .worship-row span:nth-child(2) { text-align: center; font-weight: 700; color: #1d4ed8; }
        .worship-row span:nth-child(3) { text-align: right; color: #333; }
        .modal { display: none; position: fixed; z-index: 1000; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; animation: fadeIn 0.2s ease-out; }
        body.dark-mode { background-color: #111827; color: #e5e7eb; }
        body.dark-mode .bg-white { background-color: #1f2937 !important; border-color: #374151; }
        body.dark-mode nav, body.dark-mode .fixed.bottom-0 { background-color: rgba(31, 41, 55, 0.95) !important; border-color: #374151; }
        body.dark-mode .text-blue-900, body.dark-mode .text-blue-950, body.dark-mode .text-blue-700 { color: #93c5fd !important; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-safe transition-all duration-300">

    <nav class="bg-white/95 backdrop-blur-md sticky top-0 z-50 shadow-sm border-b font-bold px-5 py-3 flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img src="logo.png" alt="교회로고" class="w-10 h-10 object-contain" onerror="this.src='logo.PNG'; this.onerror=null;">
            <div class="flex flex-col">
                <span class="text-blue-900 text-lg font-bold tracking-tighter">원종제일교회</span>
                <span class="text-[9px] text-blue-500 uppercase font-bold tracking-widest">Wonjong First Church</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleFontSize()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center active:scale-90 shadow-sm"><i class="fas fa-search-plus"></i></button>
            <button onclick="toggleDarkMode()" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center active:scale-90 shadow-sm"><i class="fas fa-moon" id="dark-icon"></i></button>
        </div>
    </nav>

    <header class="relative h-[22vh] flex items-center justify-center border-b-4 border-orange-400">
        <div class="absolute inset-0 bg-church opacity-90 z-10"></div>
        <div class="relative z-20 text-center text-white px-6">
            <div id="smart-greeting" class="text-blue-100 text-[10px] font-bold uppercase tracking-[0.2em] mb-2 bg-white/10 py-1 px-3 rounded-full inline-block">HAPPY SUNDAY</div>
            <h1 class="text-2xl font-black tracking-widest uppercase italic mb-1">Wonjong First</h1>
            <p class="text-[11px] text-blue-100 opacity-80 font-bold" id="today-date-display">2026.03.15 제11호 온라인주보</p>
        </div>
    </header>

    <main class="container mx-auto px-5 py-8 space-y-10">

        <section id="praise-hub">
            <div class="bg-white rounded-[2rem] card-shadow p-6 border-l-8 border-blue-600 flex items-center justify-between transition hover:scale-[1.01]">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-blue-50 rounded-2xl flex items-center justify-center text-blue-600 text-xl shadow-inner">
                        <i class="fas fa-microphone-lines"></i>
                    </div>
                    <div>
                        <h3 class="font-bold text-gray-800 text-sm italic">원종제일교회 찬양단</h3>
                        <p class="text-[9px] text-blue-400 font-bold uppercase tracking-widest">Worship Music Team</p>
                    </div>
                </div>
                <a href="https://ikyullee-byte.github.io/worship/" target="_blank" class="bg-blue-900 text-white px-5 py-2.5 rounded-xl text-xs font-bold shadow-lg active:scale-95 transition-transform flex items-center gap-2">
                    바로가기 <i class="fas fa-chevron-right text-[10px]"></i>
                </a>
            </div>
        </section>

        <section id="morning">
            <div class="bg-white rounded-[2.5rem] card-shadow overflow-hidden border border-gray-100">
                <div class="bg-blue-900 p-6 text-center text-white">
                    <p class="font-bold text-sm italic">주일 오전 예배 (11:00)</p>
                </div>
                <div class="p-6">
                    <div class="worship-row"><span>찬송</span><span>421장</span><span>다같이</span></div>
                    <div class="worship-row"><span>성경봉독</span><span>엡 5:8-14</span><span>집례자</span></div>
                    <div class="py-6 my-4 bg-orange-50 rounded-3xl text-center border border-orange-100 px-4 text-orange-950 font-bold italic text-xl">"영적 시선으로"</div>
                    <div class="worship-row border-none pt-2 font-bold"><span>축도</span><span>-</span><span>이성결 목사</span></div>
                </div>
            </div>
        </section>

    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t flex justify-around items-center py-4 px-3 z-[100] rounded-t-[2.5rem] shadow-2xl transition-colors">
        <a href="#morning" class="flex flex-col items-center text-gray-400"><i class="fas fa-list-ol text-xl mb-1"></i><span class="text-[10px] font-bold">주보</span></a>
        <button onclick="openModal()" class="flex flex-col items-center text-gray-400"><i class="fas fa-won-sign text-xl mb-1"></i><span class="text-[10px] font-bold">헌금</span></button>
    </div>

    <div id="giveModal" class="modal" onclick="closeModal()">
        <div class="bg-white rounded-[2.5rem] w-full max-w-sm p-8 text-center shadow-2xl" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-6 italic">온라인 헌금 안내</h3>
            <div class="bg-blue-50 p-6 rounded-3xl border border-blue-100 mb-6 font-bold text-blue-950">
                <p class="text-[10px] text-blue-500 mb-1">NH 농협은행 (원종제일교회)</p>
                <p class="text-xl font-bold select-all">302-1765-3728-91</p>
            </div>
            <button onclick="closeModal()" class="w-full py-4 bg-gray-900 text-white rounded-2xl font-bold">닫기</button>
        </div>
    </div>

    <script>
        function toggleDarkMode() { 
            document.body.classList.toggle('dark-mode'); 
            document.getElementById('dark-icon').className = document.body.classList.contains('dark-mode') ? 'fas fa-sun' : 'fas fa-moon';
        }
        function toggleFontSize() { document.body.classList.toggle('large-text'); }
        function openModal() { document.getElementById('giveModal').classList.add('active'); }
        function closeModal() { document.getElementById('giveModal').classList.remove('active'); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>원종제일교회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        /* 하단 여백 확보 (플로팅 메뉴 때문) */
        .pb-safe { padding-bottom: calc(4rem + env(safe-area-inset-bottom)); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-safe">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="#" class="text-xl font-bold text-blue-800 flex items-center">
                <span class="mr-2">⛪</span> 원종제일교회
            </a>
            <div class="hidden md:flex space-x-6 items-center">
                <a href="#" class="hover:text-blue-600">교회소개</a>
                <a href="#" class="hover:text-blue-600">예배안내</a>
                <a href="https://youtube.com/live/링크넣기" target="_blank" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold">실시간 예배</a>
            </div>
            <button class="md:hidden text-2xl p-2"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <header class="relative h-[50vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-black/40 z-10"></div>
        <img src="https://images.unsplash.com/photo-1544427920-c49ccfb85579?auto=format&fit=crop&w=1600&q=80" class="absolute inset-0 w-full h-full object-cover" alt="Main">
        
        <div class="relative z-20 text-center text-white px-6">
            <p class="text-blue-300 font-bold text-sm mb-2 tracking-widest">2026 성령으로 하나되는 교회</p>
            <h1 class="text-2xl md:text-5xl font-bold mb-6 leading-tight">오직 주만이 나의 반석이시요<br>나의 구원이시니</h1>
        </div>
    </header>

    <section class="px-4 -mt-12 relative z-30">
        <div class="grid grid-cols-2 gap-3">
            <div class="bg-white p-5 rounded-xl shadow-md text-center active:bg-gray-100">
                <div class="text-2xl mb-2 text-blue-500"><i class="fas fa-calendar-alt"></i></div>
                <span class="font-bold text-sm">예배 시간</span>
            </div>
            <div class="bg-white p-5 rounded-xl shadow-md text-center active:bg-gray-100">
                <div class="text-2xl mb-2 text-green-500"><i class="fas fa-map-marker-alt"></i></div>
                <span class="font-bold text-sm">오시는 길</span>
            </div>
        </div>
    </section>

    <section class="py-12 container mx-auto px-4">
        <div class="flex justify-between items-end mb-4 border-b pb-2">
            <h2 class="text-xl font-bold">교회 소식</h2>
            <a href="#" class="text-sm text-gray-500">전체보기</a>
        </div>
        <div class="space-y-1">
            <div class="bg-white p-4 rounded-lg mb-2 shadow-sm flex justify-between items-center active:bg-gray-50">
                <span class="text-sm font-medium">[알림] 2026년 봄 정기 심방 안내</span>
                <span class="text-gray-400 text-xs">03.01</span>
            </div>
            <div class="bg-white p-4 rounded-lg mb-2 shadow-sm flex justify-between items-center active:bg-gray-50">
                <span class="text-sm font-medium">이번 주 주일 식사 봉사 명단</span>
                <span class="text-gray-400 text-xs">02.28</span>
            </div>
        </div>
    </section>

    <footer class="bg-white py-10 border-t text-gray-600 px-4 mb-10">
        <div class="text-center">
            <h3 class="font-bold text-blue-900 mb-2 text-base">원종제일교회</h3>
            <p class="text-xs leading-5">
                담임목사: 이성결 | 주소: 부천시 원종로36번길 20 <br>
                대표번호: 032-123-4567
            </p>
            <div class="flex justify-center space-x-6 mt-6">
                <a href="#" class="text-gray-400 text-xl"><i class="fab fa-youtube"></i></a>
                <a href="#" class="text-gray-400 text-xl"><i class="fab fa-instagram"></i></a>
                <a href="#" class="text-gray-400 text-xl"><i class="fas fa-comment"></i></a>
            </div>
        </div>
    </footer>

    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center py-2 px-2 z-[100] shadow-[0_-2px_10px_rgba(0,0,0,0.1)]">
        <a href="#jubo" class="flex flex-col items-center text-gray-600">
            <i class="fas fa-book-open text-lg"></i>
            <span class="text-[10px] mt-1">주보보기</span>
        </a>
        <a href="https://youtube.com/live/..." class="flex flex-col items-center text-red-600 font-bold">
            <i class="fab fa-youtube text-xl"></i>
            <span class="text-[10px] mt-1">실시간예배</span>
        </a>
        <a href="#map" class="flex flex-col items-center text-gray-600">
            <i class="fas fa-location-dot text-lg"></i>
            <span class="text-[10px] mt-1">오시는길</span>
        </a>
        <a href="#give" class="flex flex-col items-center text-gray-600">
            <i class="fas fa-heart text-lg"></i>
            <span class="text-[10px] mt-1">온라인헌금</span>
        </a>
    </div>

</body>
</html>

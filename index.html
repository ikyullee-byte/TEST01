<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>원종제일교회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900">

    <nav class="bg-white/90 backdrop-blur-md sticky top-0 z-50 shadow-sm">
        <div class="container mx-auto px-4 py-3 flex justify-between items-center">
            <a href="#" class="text-xl font-bold text-blue-800 flex items-center">
                <span class="mr-2">⛪</span> 평안교회
            </a>
            <div class="hidden md:flex space-x-6 items-center">
                <a href="#" class="hover:text-blue-600">교회소개</a>
                <a href="#" class="hover:text-blue-600">예배안내</a>
                <a href="#" class="hover:text-blue-600">교회소식</a>
                <a href="https://youtube.com/live/링크넣기" target="_blank" class="bg-red-600 text-white px-4 py-2 rounded-lg text-sm font-bold hover:bg-red-700 transition flex items-center">
                    <i class="fab fa-youtube mr-2"></i> 실시간 예배
                </a>
            </div>
            <button class="md:hidden text-2xl"><i class="fas fa-bars"></i></button>
        </div>
    </nav>

    <header class="relative h-[60vh] md:h-[70vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-black/40 z-10"></div>
        <img src="https://images.unsplash.com/photo-1544427920-c49ccfb85579?auto=format&fit=crop&w=1600&q=80" class="absolute inset-0 w-full h-full object-cover" alt="Church Interior">
        
        <div class="relative z-20 text-center text-white px-4">
            <p class="text-blue-300 font-bold mb-2 tracking-widest">2026년 표어: 성령으로 하나되는 교회</p>
            <h1 class="text-3xl md:text-5xl font-bold mb-6 leading-tight">오직 주만이 나의 반석이시요<br>나의 구원이시니</h1>
            
            <div class="flex flex-col md:flex-row gap-4 justify-center">
                <a href="#live" class="bg-red-600 hover:bg-red-700 text-white px-8 py-3 rounded-full font-bold flex items-center justify-center">
                    <i class="fab fa-youtube mr-2"></i> 유튜브 온라인 예배
                </a>
                <a href="#jubo" class="bg-white/20 backdrop-blur-md hover:bg-white/30 text-white px-8 py-3 rounded-full font-bold border border-white/50">
                    이번 주 주보 보기
                </a>
            </div>
        </div>
    </header>

    <section class="container mx-auto px-4 -mt-10 relative z-30">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-6 rounded-2xl shadow-lg text-center hover:-translate-y-1 transition cursor-pointer">
                <div class="text-3xl mb-2 text-blue-500"><i class="fas fa-calendar-alt"></i></div>
                <span class="font-bold">예배 시간</span>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-lg text-center hover:-translate-y-1 transition cursor-pointer">
                <div class="text-3xl mb-2 text-green-500"><i class="fas fa-map-marker-alt"></i></div>
                <span class="font-bold">오시는 길</span>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-lg text-center hover:-translate-y-1 transition cursor-pointer">
                <div class="text-3xl mb-2 text-orange-500"><i class="fas fa-hand-holding-heart"></i></div>
                <span class="font-bold">온라인 헌금</span>
            </div>
            <div class="bg-white p-6 rounded-2xl shadow-lg text-center hover:-translate-y-1 transition cursor-pointer">
                <div class="text-3xl mb-2 text-purple-500"><i class="fas fa-child"></i></div>
                <span class="font-bold">다음 세대</span>
            </div>
        </div>
    </section>

    <section class="py-20 container mx-auto px-4">
        <div class="flex flex-col md:flex-row gap-12">
            <div class="flex-1">
                <div class="flex justify-between items-end mb-6 border-b-2 border-gray-200 pb-2">
                    <h2 class="text-2xl font-bold">교회 소식</h2>
                    <a href="#" class="text-sm text-gray-500">더보기 +</a>
                </div>
                <ul class="space-y-4">
                    <li class="flex justify-between items-center group cursor-pointer">
                        <span class="group-hover:text-blue-600 transition">[알림] 2026년 봄 정기 심방 안내</span>
                        <span class="text-gray-400 text-sm">03.01</span>
                    </li>
                    <li class="flex justify-between items-center group cursor-pointer border-t pt-4">
                        <span class="group-hover:text-blue-600 transition">이번 주 주일 식사 봉사 명단</span>
                        <span class="text-gray-400 text-sm">02.28</span>
                    </li>
                </ul>
            </div>
            <div class="md:w-1/3">
                <div class="bg-gray-200 rounded-xl aspect-[3/4] flex items-center justify-center text-gray-500 font-bold overflow-hidden">
                    <img src="https://via.placeholder.com/300x400?text=Weekly+Bulletin" class="w-full h-full object-cover" alt="주보 이미지">
                </div>
            </div>
        </div>
    </section>

    <footer class="bg-gray-100 py-12 border-t text-gray-600">
        <div class="container mx-auto px-4 text-center md:text-left grid md:grid-cols-2 gap-8">
            <div>
                <h3 class="font-bold text-lg mb-4 text-blue-900 font-bold">평안교회</h3>
                <p class="text-sm leading-relaxed">
                    담임목사: 이성결 | 주소: 부천시 원종로36번길20 <br>
                    사업자번호: 123-82-12345 | 대표번호: 02-123-4567
                </p>
            </div>
            <div class="flex justify-center md:justify-end space-x-4">
                <a href="#" class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center hover:bg-blue-100 transition"><i class="fab fa-youtube"></i></a>
                <a href="#" class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center hover:bg-blue-100 transition"><i class="fab fa-instagram"></i></a>
                <a href="#" class="w-10 h-10 bg-gray-200 rounded-full flex items-center justify-center hover:bg-blue-100 transition"><i class="fas fa-comment"></i></a>
            </div>
        </div>
    </footer>

</body>

</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>원종제일교회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .bg-church { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .pb-safe { padding-bottom: calc(5rem + env(safe-area-inset-bottom)); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-safe">

    <nav class="glass sticky top-0 z-50 shadow-sm border-b">
        <div class="container mx-auto px-5 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center">
                <div class="h-10 md:h-12">
                    <img src="logo.PNG?v=1" alt="Logo" class="h-full w-auto object-contain" 
                         onerror="this.src='logo.png?v=1'; this.onerror=null;">
                </div>
            </a>
            <button class="text-blue-900 text-2xl p-2"><i class="fas fa-bars-staggered"></i></button>
        </div>
    </nav>

    <header class="relative h-[45vh] flex items-center justify-center overflow-hidden">
        <div class="absolute inset-0 bg-church opacity-80 z-10"></div>
        <img src="https://images.unsplash.com/photo-1544427920-c49ccfb85579?auto=format&fit=crop&w=1600&q=80" class="absolute inset-0 w-full h-full object-cover grayscale-[30%]" alt="Church">
        <div class="relative z-20 text-center text-white px-6">
            <h1 class="text-3xl font-bold mb-4 leading-tight">성령으로 하나되어<br><span class="text-orange-300 font-extrabold">부흥하는 교회</span></h1>
            <p class="text-blue-100 text-sm">"오직 주만이 나의 반석이시요 나의 구원이시니"</p>
        </div>
    </header>

    <section class="container mx-auto px-5 -mt-16 relative z-30">
        <div class="grid grid-cols-2 gap-4">
            <div class="bg-white p-6 rounded-[2rem] shadow-lg text-center active:scale-95 transition-all">
                <i class="fas fa-clock text-blue-600 text-xl mb-2"></i><br>
                <span class="font-bold text-sm">예배시간</span>
            </div>
            <div class="bg-white p-6 rounded-[2rem] shadow-lg text-center active:scale-95 transition-all">
                <i class="fas fa-location-dot text-green-600 text-xl mb-2"></i><br>
                <span class="font-bold text-sm">오시는길</span>
            </div>
        </div>
    </section>

    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white border-t flex justify-around items-center py-4 z-[100] shadow-lg rounded-t-3xl">
        <a href="#" class="flex flex-col items-center text-blue-900"><i class="fas fa-house text-xl"></i><span class="text-[10px]">홈</span></a>
        <a href="#jubo" class="flex flex-col items-center text-gray-400"><i class="fas fa-book-open text-xl"></i><span class="text-[10px]">주보</span></a>
        <a href="https://youtube.com/live/..." target="_blank" class="relative -mt-10 bg-red-600 w-14 h-14 rounded-full flex items-center justify-center text-white shadow-xl border-4 border-white"><i class="fab fa-youtube text-2xl"></i></a>
        <a href="#map" class="flex flex-col items-center text-gray-400"><i class="fas fa-map-location-dot text-xl"></i><span class="text-[10px]">위치</span></a>
        <a href="#give" class="flex flex-col items-center text-gray-400"><i class="fas fa-hand-holding-heart text-xl"></i><span class="text-[10px]">헌금</span></a>
    </div>

</body>
</html>

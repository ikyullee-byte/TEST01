<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>원종제일교회 스마트 주보</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        
        html { scroll-behavior: smooth; scroll-padding-top: 5rem; }
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; transition: background-color 0.3s, color 0.3s; overflow-x: hidden; }
        
        .bg-church { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); transition: all 0.3s; }
        .pb-safe { padding-bottom: calc(7.5rem + env(safe-area-inset-bottom)); }
        
        .worship-row { display: grid; grid-template-columns: 1fr 1.2fr 1fr; border-bottom: 1px dotted #e5e7eb; padding: 12px 0; font-size: 0.95rem; align-items: center; }
        .worship-row span:nth-child(1) { text-align: left; color: #666; }
        .worship-row span:nth-child(2) { text-align: center; font-weight: 700; color: #1d4ed8; }
        .worship-row span:nth-child(3) { text-align: right; color: #333; }

        .modal { display: none; position: fixed; z-index: 1000; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; animation: fadeIn 0.2s ease-out; }
        
        .bible-scroll-container { max-height: 55vh; overflow-y: auto; overflow-x: auto; background: white; border-radius: 1rem; border: 1px solid #eee; scroll-behavior: smooth; }
        .bible-table { width: 100%; border-collapse: collapse; font-size: 11px; min-width: 850px; }
        .bible-table th { background: #1e3a8a; color: white; padding: 10px 4px; position: sticky; top: 0; z-index: 30; }
        .bible-table td { border: 1px solid #eee; padding: 8px 4px; text-align: center; }
        .day-cell { background: #f1f5f9; font-weight: bold; width: 35px; position: sticky; left: 0; z-index: 10; }
        
        .today-cell-highlight { background-color: #fef3c7 !important; outline: 3px solid #ea580c !important; outline-offset: -2px; color: #c2410c !important; font-weight: 900 !important; position: relative; z-index: 20; transform: scale(1.05); }
        .today-highlight { background-color: #fef3c7 !important; border: 2px solid #ea580c !important; transform: scale(1.05); transition: all 0.3s; }
        .today-highlight div:first-child { color: #ea580c !important; }
        .today-highlight div:last-child { color: #c2410c !important; font-weight: 900 !important; }

        body.dark-mode { background-color: #111827; color: #e5e7eb; }
        body.dark-mode .bg-white { background-color: #1f2937 !important; border-color: #374151; }
        body.dark-mode nav, body.dark-mode .fixed.bottom-0 { background-color: rgba(31, 41, 55, 0.95) !important; border-color: #374151; }
        body.dark-mode .text-blue-900, body.dark-mode .text-blue-950, body.dark-mode .text-blue-700 { color: #93c5fd !important; }
        body.dark-mode .worship-row { border-bottom-color: #374151; }
        body.dark-mode textarea { background-color: #111827; color: white; border-color: #4b5563; }
        body.dark-mode #passion-week-special { border-color: #6b21a8; }

        body.large-text { font-size: 1.25rem !important; }
        body.large-text .text-sm { font-size: 1.15rem !important; }
        body.large-text .worship-row { font-size: 1.15rem !important; }
        
        .tts-btn { background: #f1f5f9; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #1e3a8a; }
        .stamp-effect { position: absolute; top: 10px; right: 20px; color: #ef4444; border: 4px solid #ef4444; border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center; font-weight: 900; font-size: 14px; transform: rotate(-15deg); opacity: 0; pointer-events: none; z-index: 50; }
        .stamp-animate { animation: stampIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
        @keyframes stampIn { 0% { transform: scale(3); opacity: 0; } 100% { transform: scale(1); opacity: 0.9; } }
        
        .floating-emoji { position: fixed; font-size: 24px; pointer-events: none; animation: floatUp 1.5s ease-out forwards; z-index: 9999; }
        @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-100px) scale(1.5); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }

        /* ✅ 오후 예배 강조용 애니메이션 */
        @keyframes pulse-red { 0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.4); } 70% { transform: scale(1.05); box-shadow: 0 0 0 15px rgba(239, 68, 68, 0); } 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); } }
        .attention-card { animation: pulse-red 2s infinite; border: 3px solid #ef4444 !important; }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-safe transition-all duration-300">

    <nav class="bg-white/95 backdrop-blur-md sticky top-0 z-50 shadow-sm border-b font-bold px-5 py-2 flex justify-between items-center">
        <div class="flex items-center">
            <img src="https://ikyullee-byte.github.io/TEST01/logo.png" alt="원종제일교회 로고" class="h-14 w-auto object-contain" onerror="this.src='https://ikyullee-byte.github.io/TEST01/logo.PNG'; this.onerror=null;">
        </div>
        <div class="flex gap-2 flex-shrink-0">
            <button onclick="toggleFontSize()" aria-label="크게보기" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center active:scale-90 shadow-sm"><i class="fas fa-search-plus"></i></button>
            <button onclick="toggleDarkMode()" aria-label="어두운모드" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center active:scale-90 shadow-sm"><i class="fas fa-moon" id="dark-icon"></i></button>
        </div>
    </nav>

    <header class="relative h-[22vh] flex items-center justify-center border-b-4 border-orange-400">
        <div class="absolute inset-0 bg-church opacity-90 z-10"></div>
        <div class="relative z-20 text-center text-white px-6">
            <div id="smart-greeting" class="text-blue-100 text-[10px] font-bold uppercase tracking-[0.2em] mb-2 bg-white/10 py-1 px-3 rounded-full inline-block">HAPPY SUNDAY</div>
            <h1 class="text-2xl font-black tracking-widest uppercase italic mb-1">Wonjong First</h1>
            <p class="text-[11px] text-blue-100 opacity-80 font-bold" id="today-date-display">2026.03.29 제13호 온라인주보</p>
        </div>
    </header>

    <main class="container mx-auto px-5 py-8 space-y-10">

        <section id="bible-weekly">
            <div class="flex justify-between items-end mb-3 px-2">
                <div class="flex items-center"><span class="w-1.5 h-4 bg-blue-600 rounded-full mr-2"></span><h2 class="text-xs font-bold text-gray-500 uppercase tracking-widest">Weekly Bible Reading</h2></div>
                <div class="text-[10px] font-bold text-blue-600" id="progress-text">내 달성률: 0%</div>
            </div>
            <div class="w-full bg-gray-200 rounded-full h-1.5 mb-4 overflow-hidden"><div id="progress-bar" class="bg-blue-600 h-1.5 rounded-full transition-all duration-1000 ease-out" style="width: 0%"></div></div>
            <div class="bg-white rounded-[2rem] card-shadow p-4 grid grid-cols-4 gap-2 text-center text-[10px]" id="bible-grid"></div>
        </section>

        <div class="grid grid-cols-1 gap-10">
            <section id="afternoon">
                <div class="bg-white rounded-[2rem] card-shadow border-4 border-red-500 overflow-hidden relative attention-card">
                    <div class="bg-red-600 p-4 text-center text-white relative flex justify-center items-center gap-2">
                        <i class="fas fa-exclamation-triangle animate-bounce"></i>
                        <p class="font-bold italic text-sm">주일 오후 예배 휴회 알림</p>
                    </div>
                    <div class="p-8 text-center bg-red-50/50">
                        <div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mx-auto mb-4 text-red-500 text-3xl shadow-lg border-4 border-red-100">
                            <i class="fas fa-calendar-xmark"></i>
                        </div>
                        <h3 class="text-lg font-black text-red-700 mb-2 leading-tight">
                            "오늘은 오후 찬양예배가 없으며,<br>오전 예배만 드립니다."
                        </h3>
                        <div class="h-px bg-red-200 w-1/2 mx-auto my-4"></div>
                        <p class="text-[12px] text-gray-600 font-bold leading-relaxed">
                            성도님들께서는 각 가정에서 가족과 함께<br>
                            <span class="text-red-600 font-black underline">고난주간을 기도로 준비</span>하시기 바랍니다.
                        </p>
                    </div>
                </div>
            </section>
            
            <section id="wednesday">
                </section>
        </div>

        </main>

    <script>
        // fullBibleData 및 기존 스크립트 그대로 유지
        // initWeeklyBible 등의 로직 포함
    </script>
</body>
</html>

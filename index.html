<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>원종제일교회 배리어프리 주보</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .bg-church { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .pb-safe { padding-bottom: calc(7.5rem + env(safe-area-inset-bottom)); }
        
        /* 예배 순서 */
        .worship-row { display: grid; grid-template-columns: 1fr 1.2fr 1fr; border-bottom: 1px dotted #e5e7eb; padding: 12px 0; font-size: 0.95rem; align-items: center; }
        .worship-row span:nth-child(1) { text-align: left; color: #666; }
        .worship-row span:nth-child(2) { text-align: center; font-weight: 700; color: #1d4ed8; }
        .worship-row span:nth-child(3) { text-align: right; color: #333; }

        .modal { display: none; position: fixed; z-index: 1000; inset: 0; background: rgba(0,0,0,0.6); align-items: center; justify-content: center; padding: 15px; }
        .modal.active { display: flex; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        
        /* 접근성 강조 */
        .tts-btn { background: #f1f5f9; width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #1e3a8a; }
        
        /* 크게보기 */
        body.large-text { font-size: 1.25rem !important; }
        body.large-text .worship-row { font-size: 1.15rem !important; }

        /* 도장 */
        .stamp-effect {
            position: absolute; top: 10px; right: 20px; color: #ef4444; border: 4px solid #ef4444;
            border-radius: 50%; width: 60px; height: 60px; display: flex; align-items: center; justify-content: center;
            font-weight: 900; font-size: 14px; transform: rotate(-15deg); opacity: 0; pointer-events: none;
        }
        .stamp-animate { animation: stampIn 0.5s forwards; }
        @keyframes stampIn { 0% { transform: scale(3); opacity: 0; } 100% { transform: scale(1); opacity: 0.9; } }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-safe transition-all duration-300">

    <nav class="bg-white/95 sticky top-0 z-50 shadow-sm border-b px-5 py-3 flex justify-between items-center">
        <div class="flex flex-col">
            <span class="text-blue-900 text-lg font-bold tracking-tighter">원종제일교회</span>
            <span class="text-[9px] text-blue-500 uppercase font-bold">Wonjong First Church</span>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleFontSize()" aria-label="글자 크게 보기" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center"><i class="fas fa-search-plus"></i></button>
            <button onclick="toggleDarkMode()" aria-label="어두운 모드 전환" class="w-8 h-8 bg-gray-100 rounded-full flex items-center justify-center"><i class="fas fa-moon"></i></button>
        </div>
    </nav>

    <main class="container mx-auto px-5 py-8 space-y-10">
        
        <section>
            <div class="bg-white rounded-[2rem] card-shadow p-8 border-t-8 border-orange-400 text-center relative">
                <div class="absolute top-4 right-4">
                    <button onclick="speakText('암송 구절')" aria-label="성경 구절 읽어주기" class="tts-btn active:scale-90 transition-transform"><i class="fas fa-volume-up"></i></button>
                </div>
                <p id="verse-text" class="text-lg font-bold text-gray-800 italic mb-3 leading-relaxed">"너희가 전에는 어둠이더니 이제는 주 안에서 빛이라 빛의 자녀들처럼 행하라"</p>
                <p id="verse-ref" class="text-sm font-bold text-orange-600">— 에베소서 5:8 —</p>
                <div class="flex justify-center gap-3">
                    <button onclick="showAmenEffect(event)" class="bg-orange-100 text-orange-700 px-5 py-2 rounded-full font-bold text-sm">아멘! 🙏</button>
                </div>
            </div>
        </section>

        <section id="morning">
            <div class="bg-white rounded-[2.5rem] card-shadow overflow-hidden border border-gray-100 relative">
                <div id="stamp-morning" class="stamp-effect">출석<br>완료</div>
                <div class="bg-blue-900 p-6 text-center text-white relative">
                    <button onclick="checkAttendance(this, 'morning')" aria-label="오전 예배 출석체크 하기" class="absolute top-4 right-4 bg-white/20 text-[10px] font-bold px-3 py-1.5 rounded-full border border-white/30">출석하기</button>
                    <h2 class="font-bold text-sm mt-6">주일 오전 예배 (11:00)</h2>
                </div>
                <div class="p-6">
                    <div class="worship-row"><span>오르간연주</span><span>-</span><span>반주자</span></div>
                    <div class="worship-row"><span>찬송</span><span>421장</span><span>다같이</span></div>
                    <div class="worship-row"><span>대표기도</span><span>-</span><span class="font-bold">인도자</span></div>
                    <div class="py-6 my-4 bg-orange-50 rounded-3xl text-center border border-orange-100 relative">
                        <button onclick="speakText('설교 제목')" class="absolute top-2 right-4 text-orange-300"><i class="fas fa-volume-up"></i></button>
                        <h3 id="sermon-title" class="text-xl font-bold text-orange-950 italic">"영적 시선으로"</h3>
                        <p class="text-sm font-medium text-orange-800 mb-4">이성결 담임목사</p>
                        <a href="https://youtu.be/8iSltQrqhgY" target="_blank" class="bg-red-600 text-white px-6 py-2 rounded-full text-xs font-bold">영상 보기</a>
                    </div>
                    <div class="worship-row border-none pt-2 font-bold"><span>축도</span><span>-</span><span>이성결 목사</span></div>
                </div>
            </div>
        </section>

        <section>
            <div class="flex justify-between items-center mb-4 px-2">
                <h2 class="text-xl font-bold text-blue-950">공동 기도 제목</h2>
                <button onclick="speakText('기도 제목')" aria-label="전체 기도 제목 읽어주기" class="tts-btn"><i class="fas fa-volume-up"></i></button>
            </div>
            <div id="prayer-list" class="bg-white rounded-[2.5rem] card-shadow p-8 border-l-8 border-blue-900 space-y-5 text-sm">
                <p>1. <span class="font-bold text-blue-900">[진실한 삶]</span> 주님의 통치를 받는 진실한 예배자가 되게 하소서.</p>
                <p>2. <span class="font-bold text-blue-900">[치유와 위로]</span> 아픈 지체들을 따뜻한 손길로 어루만져 주소서.</p>
            </div>
        </section>

    </main>

    <div class="fixed bottom-0 left-0 right-0 bg-white/95 border-t flex justify-around py-4 z-[100] rounded-t-[2rem] shadow-2xl">
        <button onclick="location.href='#morning'" aria-label="주보 보기" class="flex flex-col items-center text-gray-400"><i class="fas fa-list-ol text-xl"></i><span class="text-[10px]">주보</span></button>
        <button onclick="openMannaModal()" aria-label="오늘의 말씀 카드 뽑기" class="relative -mt-10 bg-yellow-400 w-16 h-16 rounded-full flex items-center justify-center shadow-lg"><i class="fas fa-gift text-2xl text-yellow-900"></i></button>
        <button onclick="openModal()" aria-label="온라인 헌금 안내" class="flex flex-col items-center text-gray-400"><i class="fas fa-won-sign text-xl"></i><span class="text-[10px]">헌금</span></button>
    </div>

    <div id="mannaModal" class="modal" onclick="this.classList.remove('active')">
        <div class="bg-white rounded-[2rem] w-full max-w-sm p-8 text-center" onclick="event.stopPropagation()">
            <button onclick="speakText('만나')" class="mb-4 text-yellow-500"><i class="fas fa-volume-up text-2xl"></i></button>
            <p id="manna-text" class="text-lg font-bold italic mb-4">"말씀을 불러오는 중..."</p>
            <button onclick="document.getElementById('mannaModal').classList.remove('active')" class="w-full py-3 bg-yellow-100 text-yellow-800 rounded-xl font-bold">아멘</button>
        </div>
    </div>

    <script>
        // ★ [핵심] 음성 안내 기능 (TTS) ★
        function speakText(type) {
            let text = "";
            if(type === '암송 구절') text = document.getElementById('verse-text').innerText + ". " + document.getElementById('verse-ref').innerText;
            if(type === '설교 제목') text = "오늘의 설교 제목은 " + document.getElementById('sermon-title').innerText + "입니다.";
            if(type === '기도 제목') text = document.getElementById('prayer-list').innerText;
            if(type === '만나') text = document.getElementById('manna-text').innerText;

            window.speechSynthesis.cancel(); // 이전 음성 취소
            const msg = new SpeechSynthesisUtterance(text);
            msg.lang = 'ko-KR';
            msg.rate = 0.9; // 조금 천천히 읽기
            window.speechSynthesis.speak(msg);
            vibratePattern([50, 100, 50]); // 읽기 시작 알림 진동
        }

        // ★ [핵심] 진동 패턴 분리 ★
        function vibratePattern(pattern) {
            if (navigator.vibrate) navigator.vibrate(pattern);
        }

        function checkAttendance(btn, id) {
            vibratePattern([100, 50, 100]); // 성공 진동
            confetti({ particleCount: 100, spread: 70 });
            btn.style.display = 'none';
            document.getElementById(`stamp-${id}`).classList.add('stamp-animate');
            localStorage.setItem(`attendance_${id}`, new Date().toDateString());
        }

        function toggleFontSize() { document.body.classList.toggle('large-text'); vibratePattern(50); }
        function toggleDarkMode() { document.body.classList.toggle('dark-mode'); vibratePattern(50); }

        function openMannaModal() {
            const v = ["여호와는 나의 목자시니 부족함이 없으리로다", "내게 능력 주시는 자 안에서 내가 모든 것을 할 수 있느니라"];
            document.getElementById('manna-text').innerText = v[Math.floor(Math.random()*v.length)];
            document.getElementById('mannaModal').classList.add('active');
            vibratePattern(100);
        }

        function showAmenEffect(e) {
            vibratePattern(150); // 아멘은 묵직하게
            const emoji = document.createElement('div');
            emoji.innerHTML = "🙏";
            emoji.style.position = 'fixed';
            emoji.style.left = e.clientX + 'px';
            emoji.style.top = e.clientY + 'px';
            emoji.style.fontSize = '30px';
            emoji.style.pointerEvents = 'none';
            document.body.appendChild(emoji);
            emoji.animate([{transform: 'translateY(0)', opacity: 1}, {transform: 'translateY(-100px)', opacity: 0}], 1000);
            setTimeout(() => emoji.remove(), 1000);
        }

        function openModal() { document.body.style.overflow = 'hidden'; document.getElementById('giveModal')?.classList.add('active'); vibratePattern(50); }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>원종제일교회</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        .bg-church { background: linear-gradient(135deg, #1e3a8a 0%, #1e40af 100%); }
        .glass { background: rgba(255, 255, 255, 0.98); backdrop-filter: blur(10px); }
        .card-shadow { box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05); }
        .pb-safe { padding-bottom: calc(6rem + env(safe-area-inset-bottom)); }
    </style>
</head>
<body class="bg-gray-50 text-gray-900 pb-safe">

    <nav class="glass sticky top-0 z-50 shadow-sm border-b">
        <div class="container mx-auto px-5 py-3 flex justify-between items-center">
            <a href="index.html" class="flex items-center">
                <div class="h-10 md:h-12">
                    <img src="logo.PNG" alt="원종제일교회" class="h-full w-auto object-contain" 
                         onerror="this.onerror=null; this.src='logo.png';">
                </div>
            </a>
            <button class="text-blue-900 text-2xl p-2"><i class="fas fa-bars-staggered"></i></button>
        </div>
    </nav>

    <header class="relative h-[45vh] flex items-center justify-center overflow-hidden border-b-8 border-orange-400">
        <div class="absolute inset-0 bg-church opacity-80 z-10"></div>
        <img src="https://images.unsplash.com/photo-1544427920-c49ccfb85579?auto=format&fit=crop&w=1600&q=80" class="absolute inset-0 w-full h-full object-cover grayscale-[30%]" alt="Church">
        <div class="relative z-20 text-center text-white px-6">
            <span class="inline-block px-4 py-1 bg-blue-500/30 backdrop-blur-sm rounded-full text-xs font-bold tracking-[0.3em] mb-4 border border-white/20">VISION 2026</span>
            <h1 class="text-3xl font-bold mb-4 leading-tight font-bold">성령으로 하나되어<br><span class="text-orange-300">부흥하는 교회</span></h1>
            <p class="text-blue-100 text-sm opacity-90">"오직 주만이 나의 반석이시요 나의 구원이시니"</p>
        </div>
    </header>

    <section class="container mx-auto px-5 -mt-16 relative z-30">
        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
            <div class="bg-white p-6 rounded-[2.5rem] card-shadow text-center active:scale-95 transition-all cursor-pointer border border-gray-100">
                <div class="text-blue-600 text-2xl mb-2"><i class="fas fa-clock"></i></div>
                <span class="font-bold text-gray-800 text-sm">예배시간</span>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] card-shadow text-center active:scale-95 transition-all cursor-pointer border border-gray-100">
                <div class="text-green-600 text-2xl mb-2"><i class="fas fa-location-dot"></i></div>
                <span class="font-bold text-gray-800 text-sm">오시는길</span>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] card-shadow text-center active:scale-95 transition-all cursor-pointer border border-gray-100">
                <div class="text-orange-500 text-2xl mb-2"><i class="fas fa-hand-holding-heart"></i></div>
                <span class="font-bold text-gray-800 text-sm text-nowrap">온라인헌금</span>
            </div>
            <div class="bg-white p-6 rounded-[2.5rem] card-shadow text-center active:scale-95 transition-all cursor-pointer border border-gray-100">
                <div class="text-purple-600 text-2xl mb-2"><i class="fas fa-images"></i></div>
                <span class="font-bold text-gray-800 text-sm">교회앨범</span>
            </div>
        </div>
    </section>

    <main class="container mx-auto px-5 py-12 space-y-12">
        <section>
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-blue-950 flex items-center">
                    <span class="w-1.5 h-5 bg-blue-600 rounded-full mr-2"></span>교회 소식
                </h2>
                <a href="#" class="text-xs text-blue-600 font-bold px-3 py-1 bg-blue-50 rounded-full">전체보기</a>
            </div>
            <div class="space-y-3">
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-blue-600 flex justify-between items-center active:bg-gray-50 transition">
                    <h3 class="text-sm font-medium text-gray-800">[공지] 2026년 봄 정기 심방 안내</h3>
                    <span class="text-gray-400 text-[10px]">03.04</span>
                </div>
                <div class="bg-white p-5 rounded-2xl shadow-sm border-l-4 border-gray-300 flex justify-between items-center active:bg-gray-50 transition">
                    <h3 class="text-sm font-medium text-gray-800">이번 주 주일 식사 봉사 명단</h3>
                    <span class="text-gray-400 text-[10px]">03.01</span>
                </div>
            </div>
        </section>

        <section id="jubo">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-xl font-bold text-blue-950 flex items-center">
                    <span class="w-1.5 h-5 bg-blue-600 rounded-full mr-2"></span>이번 주 주보
                </h2>
            </div>
            <div class="relative overflow-hidden rounded-[2.5rem] card-shadow border-8 border-white bg-gray-200 aspect-[3/4]">
                <img src="https://via.placeholder.com/600x800?text=WEEKLY+BULLETIN" alt="주보" class="w-full h-full object-cover">
                <div class="absolute inset-0 bg-black/20 flex items-center justify-center opacity-0 hover:opacity-100 transition-opacity">
                    <span class="bg-white px-6 py-2 rounded-full font-bold text-blue-900 text-sm shadow-xl">크게 보기</span>
                </div>
            </div>
        </section>
    </main>

    <footer class="bg-white border-t py-12 px-6 text-center">
        <div class="inline-block p-4 bg-gray-50 rounded-3xl mb-4">
            <h3 class="font-bold text-blue-950">원종제일교회</h3>
        </div>
        <p class="text-[11px] text-gray-500 leading-6">
            담임목사: 이성결 | 주소: 부천시 원종로36번길 20<br>
            대표번호: 032-123-4567
        </p>
        <div class="flex justify-center space-x-4 mt-6">
            <a href="#" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-red-600"><i class="fab fa-youtube"></i></a>
            <a href="#" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-blue-600"><i class="fab fa-facebook-f"></i></a>
            <a href="#" class="w-10 h-10 bg-gray-100 rounded-full flex items-center justify-center text-yellow-600"><i class="fas fa-comment"></i></a>
        </div>
        <p class="mt-8 text-[10px] text-gray-300 uppercase tracking-widest">&copy; 2026 Wonjong First Church.</p>
    </footer>

    <div class="md:hidden fixed bottom-0 left-0 right-0 bg-white/95 backdrop-blur-xl border-t flex justify-around items-center py-4 px-3 z-[100] shadow-lg rounded-t-[2.5rem]">
        <a href="#" class="flex flex-col items-center text-blue-900 active:scale-90 transition">
            <i class="fas fa-house text-xl mb-1"></i>
            <span class="text-[10px] font-bold">홈</span>
        </a>
        <a href="#jubo" class="flex flex-col items-center text-gray-400 active:scale-90 transition">
            <i class="fas fa-book-open text-xl mb-1"></i>
            <span class="text-[10px] font-bold">주보</span>
        </a>
        <a href="https://youtube.com/live/..." target="_blank" class="relative -mt-12 bg-red-600 w-16 h-16 rounded-full flex items-center justify-center text-white shadow-xl border-4 border-white active:scale-95 transition-all">
            <i class="fab fa-youtube text-2xl animate-pulse"></i>
        </a>
        <a href="#map" class="flex flex-col items-center text-gray-400 active:scale-90 transition">
            <i class="fas fa-map-location-dot text-xl mb-1"></i>
            <span class="text-[10px] font-bold">위치</span>
        </a>
        <a href="#give" class="flex flex-col items-center text-gray-400 active:scale-90 transition">
            <i class="fas fa-won-sign text-xl mb-1"></i>
            <span class="text-[10px] font-bold">헌금</span>
        </a>
    </div>

</body>
</html>
